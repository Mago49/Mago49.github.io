<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário com Códigos e Plataformas</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    :root{
      --level-0: #fecdd3;
      --level-1: #dcfce7;
      --level-2: #fef9c3;
      --level-3: #fde68a;
      --level-4: #D3D3D3;
      --text-dark: #0f172a;
      --modal-bg: #ffffff;
      --modal-accent: #15803d;
      --modal-cancel: #ef4444;
      --footer-bg: rgba(255,255,255,0.95);
      --event-border: rgba(0,0,0,0.08);
    }

    html, body {
      min-height: 100vh; margin: 0; padding: 0;
      font-family: 'Poppins', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color: var(--text-dark);
      overflow-x: hidden;
      background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
    }

    /* Calendar container */
    #calendar {
      position: relative;
      z-index: 10;
      width: 100%;
      height: calc(100vh - 96px);
      background: rgba(255,255,255,0.9);
      box-sizing: border-box;
      padding: 1rem;
    }

    .background-svg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.9;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center;
      z-index: 40;
      padding: 1rem;
    }
    .modal-content {
      background: var(--modal-bg); padding: 1.25rem; border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
      text-align: center; max-width: 420px; width: 100%;
      border: 1px solid var(--event-border);
    }
    .modal-content h2 { margin: 0 0 0.75rem 0; font-size: 1.125rem; }
    .modal-row { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.75rem; }
    .modal-row label { flex: 0 0 90px; text-align:left; font-size:0.9rem; color: #334155; }
    .modal-content input[type="text"], .modal-content select {
      flex: 1; padding: .5rem; font-size: 1rem;
      border: 1px solid #e6e9ee; border-radius: .5rem;
      text-align: center;
      background: #fff;
    }
    .modal-actions { display:flex; gap:0.5rem; justify-content:center; margin-top:0.5rem; }
    .modal-content button {
      padding: .5rem 1rem; border: none; border-radius: .5rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-save { background: var(--modal-accent); color: #fff; }
    .btn-cancel { background: var(--modal-cancel); color: #fff; }
    .btn-delete { background: #6b7280; color: #fff; }

    /* Footer legenda */
    footer.legend {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      background: var(--footer-bg);
      border-top: 1px solid rgba(15,23,42,0.06);
      display:flex; gap:1rem; align-items:center;
      padding: 0.75rem 1rem;
      box-shadow: 0 -6px 18px rgba(2,6,23,0.03);
      flex-wrap:wrap;
    }
    .legend-item { display:flex; gap:0.5rem; align-items:center; font-size:0.95rem; color:var(--text-dark); }
    .legend-swatch { width:28px; height:20px; border-radius:6px; border:1px solid var(--event-border); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.03); }
    .legend-label { font-weight:600; margin-right:0.25rem; color:#0f172a; }

/* Painel de totais mensais */
#platformPanel {
  position: relative;
  width: 100%;
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(15,23,42,0.06);
  border-radius: 12px;
  box-shadow: 0 4px 12px rgba(2,6,23,0.06);
  padding: 0.75rem;
  margin-top: 1rem;
}
#platformPanel h3 {
  margin: 0 0 0.5rem 0;
  font-size: 1rem;
  font-weight: 600;
}
#platformList {
  list-style: none;
  margin: 0;
  padding: 0;
}
#platformList li {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem;
  border-bottom: 1px solid #e6e9ee;
}
#platformList li .name {
  font-weight: 600;
}

/* Event styling helper */
    .fc-event {
      Border-radius: 8px;
      Padding: 2px 6px;
      Font-weight:700;
      Color: #0f172a;
      Border: 1px solid rgba(0,0,0,0.06);
      Box-shadow: none;
    }

    /* Painel de totais mensais */
    #platformPanel {
      Position: relative;
      Width: 100%;
      Background: rgba(255,255,255,0.95);
      Border: 1px solid rgba(15,23,42,0.06);
      Border-radius: 12px;
      Box-shadow: 0 4px 12px rgba(2,6,23,0.06);
      Padding: 0.75rem;
      Margin-top: 1rem;
    }
    #platformPanel h3 {
      Margin: 0 0 0.5rem 0;
      Font-size: 1rem;
      Font-weight: 600;
    }
    #platformList {
      List-style: none;
      Margin: 0;
      Padding: 0;
    }
    #platformList li {
      Display: flex;
      Justify-content: space-between;
      Padding: 0.5rem;
      Border-bottom: 1px solid #e6e9ee;
    }
    #platformList li .name {
      Font-weight: 600;
    }

    /* Modal select and bonus preview */
    .modal-content select#platformSelect {
      Flex: 1;
      Padding: .5rem;
      Font-size: 1rem;
      Border: 1px solid #e6e9ee;
      Border-radius: .5rem;
      Background: #fff;
      Text-align: center;
    }
    #bonusPreview {
      Flex: 1;
      Padding: .45rem;
      Border-radius: .5rem;
      Border: 1px solid #e6e9ee;
      Background:#f8fafc;
      Font-weight:700;
      Text-align:center;
    }
  </style>
</head>

<body>
  <!—Fundo animado com bolinhas 
  <svg class=”background-svg” viewBox=”0 0 1440 800” preserveAspectRatio=”xMidYMid slice” xmlns=http://www.w3.org/2000/svg aria-hidden=”true”>
    <circle cx=”280” cy=”280” r=”280” fill=”#1e3a8a” />
    <circle cx=”1160” cy=”280” r=”280” fill=”#ef4444” />
    <circle cx=”280” cy=”520” r=”280” fill=”#facc15” />
    <circle cx=”1160” cy=”520” r=”280” fill=”#15803d” />
  </svg>

  <!—Calendário 
  <div id=”calendar”></div>

  <!—Painel de totais mensais 
  <section id=”platformPanel”>
    <h3>Totais mensais por plataforma</h3>
    <ul id=”platformList”></ul>
  </section>

  <!—Modal para inserir/editar código 
  <div class=”modal” id=”codeModal” role=”dialog” aria-modal=”true” aria-labelledby=”modalTitle”>
    <div class=”modal-content” role=”document”>
      <h2 id=”modalTitle”>Adicionar / Editar Código</h2>

      <div class=”modal-row”>
        <label for=”codeInput”>Código</label>
        <input type=”text” id=”codeInput” maxlength=”8” placeholder=”Ex: DDUU ou 1234” />
      </div>

      <div class=”modal-row”>
        <label for=”levelSelect”>Nível</label>
        <select id=”levelSelect” aria-label=”Selecionar nível”>
          <option value=”0”>Nível 0 — 1–29</option>
          <option value=”1”>Nível 1 — 30–69</option>
          <option value=”2”>Nível 2 — 70–149</option>
          <option value=”3”>Nível 3 — 150–299</option>
          <option value=”4”>Nível 4 — 300–600</option>
        </select>
      </div>

      <div class=”modal-row” style=”justify-content:center;”>
        <label for=”valueInput”>Valor</label>
        <input type=”text” id=”valueInput” placeholder=”Ex: 45” inputmode=”numeric” />
      </div>

      <div class=”modal-row” style=”justify-content:center;”>
        <label for=”platformSelect”>Plataforma</label>
        <select id=”platformSelect” aria-label=”Selecionar plataforma”>
          <!—opções preenchidas via JS 
        </select>
      </div>

      <div class=”modal-row” id=”bonusRow” style=”justify-content:center; display:none;”>
        <label for=”bonusPreview”>Bônus previsto</label>
        <input type=”text” id=”bonusPreview” readonly />
      </div>

      <div class=”modal-actions”>
        <button class=”btn-save” id=”saveCode”>Salvar</button>
        <button class=”btn-delete” id=”deleteCode” style=”display:none;”>Excluir</button>
        <button class=”btn-cancel” id=”cancelCode”>Cancelar</button>
      </div>
    </div>
  </div>

  <!—Rodapé com níveis 
  <footer class=”legend” aria-hidden=”false”>
    <div class=”legend-item”><div class=”legend-swatch” style=”background:var(--level-0)”></div><div><span class=”legend-label”>Nível 0</span><span>1–29</span></div></div>
    <div class=”legend-item”><div class=”legend-swatch” style=”background:var(--level-1)”></div><div><span class=”legend-label”>Nível 1</span><span>30–69</span></div></div>
    <div class=”legend-item”><div class=”legend-swatch” style=”background:var(--level-2)”></div><div><span class=”legend-label”>Nível 2</span><span>70–149</span></div></div>
    <div class=”legend-item”><div class=”legend-swatch” style=”background:var(--level-3)”></div><div><span class=”legend-label”>Nível 3</span><span>150–299</span></div></div>
    <div class=”legend-item”><div class=”legend-swatch” style=”background:var(--level-4)”></div><div><span class=”legend-label”>Nível 4</span><span>300–600</span></div></div>
  </footer>

  <script>
  Document.addEventListener(‘DOMContentLoaded’, () => {
    /* -------------------------
       Fundo animado (simplificado)
       ------------------------- */
    Const svg = document.querySelector(‘svg.background-svg’);
    Const circles = Array.from(svg.querySelectorAll(‘circle’));
    Const viewbox = svg.viewBox.baseVal;
    Const initialRadii = [280, 280, 280, 280];

    Const data = circles.map((c, i) => {
      Const initR = initialRadii[i] * (0.28 + Math.random() * 0.12);
      Return {
        El: c,
        X: (Math.random() * viewbox.width) | 0,
        Y: (Math.random() * viewbox.height) | 0,
        R: initR,
        Vx: (Math.random() * 0.6 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
        Vy: (Math.random() * 0.6 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
        Vr: (Math.random() * 0.04 + 0.01) * (Math.random() < 0.5 ? -1 : 1),
        Rmin: initR * 0.4,
        Rmax: initR * 1.3
      };
    });

    Function animate() {
      Data.forEach((d) => {
        d.x += d.vx;
        d.y += d.vy;
        d.r += d.vr;
        if (d.x < -200 || d.x > viewbox.width + 200) d.vx *= -1;
        if (d.y < -200 || d.y > viewbox.height + 200) d.vy *= -1;
        if (d.r < d.rmin || d.r > d.rmax) d.vr *= -1;
        d.el.setAttribute(‘cx’, d.x);
        d.el.setAttribute(‘cy’, d.y);
        d.el.setAttribute(‘r’, Math.max(10, d.r));
      });
      requestAnimationFrame(animate);
    }
    Animate();

/* -------------------------
       Painel de plataformas (totais mensais)
       ------------------------- */
    Const DEFAULT_PLATFORMS = [
      “A73”,”DDUU”,”EE44”,”FXX”,”HHH5”,”NNZZ”,”PP11”,”1UUU”,”11TT”,”552X”,
      “35C”,”36Q”,”44MM”,”45T”,”5TTT”,”53D”,”551X”,”61T”,”63V”,”66GG”,”68D”,
      “7GGG”,”7JJJ”,”72B”,”79C”,”83H”,”838X”,”84D”,”877X”,”899V”,”93D”,”93K”,”988K”
    ];

    /* -------------------------
       Calendário e persistência
       ------------------------- */
    Const calendarEl = document.getElementById(‘calendar’);
    Const STORAGE_KEY = ‘calendarEvents_v2’;
    Let savedEvents = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    Function colorForLevel(level){
      Switch(String(level)){
        Case ‘0’: return getComputedStyle(document.documentElement).getPropertyValue(‘—level-0’).trim();
        Case ‘1’: return getComputedStyle(document.documentElement).getPropertyValue(‘—level-1’).trim();
        Case ‘2’: return getComputedStyle(document.documentElement).getPropertyValue(‘—level-2’).trim();
        Case ‘3’: return getComputedStyle(document.documentElement).getPropertyValue(‘—level-3’).trim();
        Case ‘4’: return getComputedStyle(document.documentElement).getPropertyValue(‘—level-4’).trim();
        Default: return ‘#ffffff’;
      }
    }

    Function genId(){ return ‘evt_’ + Date.now() + ‘_’ + Math.floor(Math.random()*1000); }

    // Função que calcula o bônus a partir do valor do depósito
    Function bonusForDeposit(value){
      Const v = Number(String(value).replace(/[^\d.,]/g, ‘’).replace(‘,’, ‘.’)) || 0;
      If (v >= 5000) return 66;
      If (v >= 2000) return 25;
      If (v >= 1000) return 10;
      If (v >= 600) return 7;
      If (v >= 300) return 3.5;
      If (v >= 150) return 1.5;
      If (v >= 70) return 0.7;
      If (v >= 30) return 0.3;
      Return 0;
    }

    Function normalizeSavedEvents(arr){
      Return arr.map(e => {
        Const levelVal = (e.extendedProps && e.extendedProps.level) != null ? e.extendedProps.level : (e.level != null ? e.level : 0);
        Const valueVal = e.extendedProps ? e.extendedProps.value : e.value;
        Const platformVal = e.extendedProps ? e.extendedProps.platform : e.platform || ‘’;
        Const bonusVal = e.extendedProps ? e.extendedProps.bonus : e.bonus || bonusForDeposit(valueVal);
        Return {
          Id: e.id || genId(),
          Title: e.title || ‘’,
          Start: e.start,
          extendedProps: { level: levelVal, value: valueVal, platform: platformVal, bonus: bonusVal },
          backgroundColor: colorForLevel(levelVal),
          borderColor: ‘rgba(0,0,0,0.06)’,
          textColor: ‘#0f172a’
        };
      });
    }

    Let lastClickDate = null;
    Let lastClickTime = 0;

    Const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: ‘dayGridMonth’,
      locale: ‘pt-br’,
      selectable: true,
      editable: true,
      headerToolbar: {
        left: ‘prev,next today’,
        center: ‘title’,
        right: ‘dayGridMonth,timeGridWeek,timeGridDay’
      },
      Events: normalizeSavedEvents(savedEvents),
      eventDisplay: ‘block’,
      eventDidMount: function(info){
        const lvl = info.event.extendedProps.level;
        const bg = colorForLevel(lvl);
        info.el.style.background = bg;
        info.el.style.color = ‘#0f172a’;
        info.el.style.border = ‘1px solid rgba(0,0,0,0.06)’;
        info.el.style.borderRadius = ‘8px’;
        info.el.style.fontWeight = ‘700’;

        // adicionar subtítulo com plataforma e bônus
        Const platformName = info.event.extendedProps.platform || ‘’;
        Const bonus = info.event.extendedProps.bonus;
        Let meta = info.el.querySelector(‘.fc-event-meta’);
        If (!meta) {
          Meta = document.createElement(‘div’);
          Meta.className = ‘fc-event-meta’;
          Meta.style.fontSize = ‘0.75rem’;
          Meta.style.fontWeight = ‘600’;
          Meta.style.marginTop = ‘4px’;
          Info.el.appendChild(meta);
        }
        Meta.textContent = platformName ? `${platformName}${bonus ? ‘ • R$ ‘ + Number(bonus).toFixed(2) : ‘’}` : (bonus ? `Bônus R$ ${Number(bonus).toFixed(2)}` : ‘’);
      },
      dateClick: function(info) {
        const now = Date.now();
        if (lastClickDate === info.dateStr && (now – lastClickTime) < 400) {
          openModalForNew(info.dateStr);
        }
        lastClickDate = info.dateStr;
        lastClickTime = now;
      },
      eventClick: function(info) {
        openModalForEdit(info.event);
      },
      eventChange: function(changeInfo){
        const ev = changeInfo.event;
        saveOrUpdateEventFromCalendar(ev);
        renderMonthlyTotals();
      }
    });

    Calendar.render();

    /* -------------------------
       Função para renderizar totais mensais
       ------------------------- */
    Function renderMonthlyTotals(){
      Const now = new Date();
      Const month = now.getMonth();
      Const year = now.getFullYear();
      Const events = calendar.getEvents().filter(ev => {
        Const d = ev.start;
        Return d.getMonth() === month && d.getFullYear() === year;
      });

      Const totals = {};
      Events.forEach(ev => {
        Const platform = ev.extendedProps.platform || ‘’;
        Const bonus = Number(ev.extendedProps.bonus) || 0;
        If (!totals[platform]) totals[platform] = { count: 0, bonus: 0 };
        Totals[platform].count++;
        Totals[platform].bonus += bonus;
      });

      Const listEl = document.getElementById(‘platformList’);
      listEl.innerHTML = ‘’;
      DEFAULT_PLATFORMS.forEach(name => {
        Const li = document.createElement(‘li’);
        Const spanName = document.createElement(‘span’);
        spanName.className = ‘name’;
        spanName.textContent = name;
        const spanMeta = document.createElement(‘span’);
        const t = totals[name];
        spanMeta.textContent = t ? `${t.count} depósitos • R$ ${t.bonus.toFixed(2)}` : ‘—‘;
        li.appendChild(spanName);
        li.appendChild(spanMeta);
        listEl.appendChild(li);
      });
    }

    // Inicializa painel ao carregar
    renderMonthlyTotals();

/* -------------------------
       Modal e manipulação de eventos
       ------------------------- */
    Const modal = document.getElementById(‘codeModal’);
    Const inputCode = document.getElementById(‘codeInput’);
    Const selectLevel = document.getElementById(‘levelSelect’);
    Const inputValue = document.getElementById(‘valueInput’);
    Const btnSave = document.getElementById(‘saveCode’);
    Const btnCancel = document.getElementById(‘cancelCode’);
    Const btnDelete = document.getElementById(‘deleteCode’);
    Const platformSelect = document.getElementById(‘platformSelect’);
    Const bonusPreview = document.getElementById(‘bonusPreview’);
    Const bonusRow = document.getElementById(‘bonusRow’);

    Function populatePlatformSelect(){
      platformSelect.innerHTML = ‘’;
      const emptyOpt = document.createElement(‘option’);
      emptyOpt.value = ‘’;
      emptyOpt.textContent = ‘— Selecionar plataforma —‘;
      platformSelect.appendChild(emptyOpt);
      DEFAULT_PLATFORMS.forEach(name => {
        Const opt = document.createElement(‘option’);
        Opt.value = name;
        Opt.textContent = name;
        platformSelect.appendChild(opt);
      });
    }

    inputValue.addEventListener(‘input’, () => {
      const b = bonusForDeposit(inputValue.value);
      if (b > 0) {
        bonusRow.style.display = ‘flex’;
        bonusPreview.value = `R$ ${b.toFixed(2)}`;
      } else {
        bonusRow.style.display = ‘none’;
        bonusPreview.value = ‘’;
      }
    });

    populatePlatformSelect();

    function openModalForNew(dateStr){
      modal.style.display = ‘flex’;
      modal.dataset.mode = ‘new’;
      modal.dataset.date = dateStr;
      modal.dataset.eventId = ‘’;
      inputCode.value = ‘’;
      selectLevel.value = ‘0’;
      inputValue.value = ‘’;
      platformSelect.value = ‘’;
      bonusRow.style.display = ‘none’;
      btnDelete.style.display = ‘none’;
      inputCode.focus();
    }

    Function openModalForEdit(event){
      Modal.style.display = ‘flex’;
      Modal.dataset.mode = ‘edit’;
      Modal.dataset.date = event.startStr;
      Modal.dataset.eventId = event.id;
      inputCode.value = event.title || ‘’;
      selectLevel.value = (event.extendedProps && event.extendedProps.level != null) ? String(event.extendedProps.level) : ‘0’;
      inputValue.value = (event.extendedProps && event.extendedProps.value != null) ? String(event.extendedProps.value) : ‘’;
      platformSelect.value = event.extendedProps && event.extendedProps.platform ? event.extendedProps.platform : ‘’;
      const b = bonusForDeposit(inputValue.value);
      if (b > 0) { bonusRow.style.display = ‘flex’; bonusPreview.value = `R$ ${b.toFixed(2)}`; } else { bonusRow.style.display = ‘none’; bonusPreview.value = ‘’; }
      btnDelete.style.display = ‘inline-block’;
      inputCode.focus();
    }

    Function closeModal(){
      Modal.style.display = ‘none’;
      Delete modal.dataset.mode;
      Delete modal.dataset.date;
      Delete modal.dataset.eventId;
    }

    btnSave.addEventListener(‘click’, () => {
      const code = inputCode.value.trim();
      const level = Number(selectLevel.value);
      const value = inputValue.value.trim();
      const platformName = platformSelect.value || ‘’;
      const bonus = bonusForDeposit(value);

      if (!code){
        alert(‘Digite um código (campo obrigatório).’);
        inputCode.focus();
        return;
      }

      Const mode = modal.dataset.mode;
      Const dateStr = modal.dataset.date;

      If (mode === ‘new’){
        Const id = genId();
        Const newEvent = {
          Id,
          Title: code,
          Start: dateStr,
          extendedProps: { level, value, platform: platformName, bonus },
          backgroundColor: colorForLevel(level),
          borderColor: ‘rgba(0,0,0,0.06)’,
          textColor: ‘#0f172a’
        };
        Calendar.addEvent(newEvent);
        savedEvents.push({
          id: newEvent.id,
          title: newEvent.title,
          start: newEvent.start,
          extendedProps: newEvent.extendedProps
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedEvents));
        closeModal();
        renderMonthlyTotals();
      } else if (mode === ‘edit’){
        Const eventId = modal.dataset.eventId;
        Const ev = calendar.getEventById(eventId);
        If (!ev){
          Alert(‘Evento não encontrado.’);
          closeModal();
          return;
        }
        Ev.setProp(‘title’, code);
        Ev.setExtendedProp(‘level’, level);
        Ev.setExtendedProp(‘value’, value);
        Ev.setExtendedProp(‘platform’, platformName);
        Ev.setExtendedProp(‘bonus’, bonus);
        Const bg = colorForLevel(level);
        Ev.setProp(‘backgroundColor’, bg);
        Ev.setProp(‘borderColor’, ‘rgba(0,0,0,0.06)’);
        Ev.setProp(‘textColor’, ‘#0f172a’);

        saveOrUpdateEventFromCalendar(ev);
        closeModal();
        renderMonthlyTotals();
      }
    });

    btnDelete.addEventListener(‘click’, () => {
      if (!confirm(‘Deseja realmente excluir este evento?’)) return;
      const eventId = modal.dataset.eventId;
      const ev = calendar.getEventById(eventId);
      if (ev) ev.remove();
      savedEvents = savedEvents.filter(e => e.id !== eventId);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedEvents));
      closeModal();
      renderMonthlyTotals();
    });

    btnCancel.addEventListener(‘click’, () => {
      closeModal();
    });

    Modal.addEventListener(‘click’, (e) => {
      If (e.target === modal) closeModal();
    });

    Function saveOrUpdateEventFromCalendar(ev){
      Const obj = {
        Id: ev.id,
        Title: ev.title,
        Start: ev.startStr,
        extendedProps: {
          level: ev.extendedProps.level != null ? ev.extendedProps.level : 0,
          value: ev.extendedProps.value != null ? ev.extendedProps.value : ‘’,
          platform: ev.extendedProps.platform != null ? ev.extendedProps.platform : ‘’,
          bonus: ev.extendedProps.bonus != null ? ev.extendedProps.bonus : bonusForDeposit(ev.extendedProps.value)
        }
      };
      Const idx = savedEvents.findIndex(x => x.id === ev.id);
      If (idx >= 0) savedEvents[idx] = obj;
      Else savedEvents.push(obj);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedEvents));
    }

    Function normalizeAndSaveStorage(){
      Const events = calendar.getEvents().map(ev => ({
        Id: ev.id,
        Title: ev.title,
        Start: ev.startStr,
        extendedProps: {
          level: ev.extendedProps.level != null ? ev.extendedProps.level : 0,
          value: ev.extendedProps.value != null ? ev.extendedProps.value : ‘’,
          platform: ev.extendedProps.platform != null ? ev.extendedProps.platform : ‘’,
          bonus: ev.extendedProps.bonus != null ? ev.extendedProps.bonus : bonusForDeposit(ev.extendedProps.value)
        }
      }));
      savedEvents = events;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedEvents));
    }

    normalizeAndSaveStorage();

    document.addEventListener(‘keydown’, (e) => {
      if (e.key === ‘Escape’) {
        if (modal.style.display === ‘flex’) closeModal();
      }
    });
  });
  </script>
</body>
