`html
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário com Códigos e Níveis Automáticos</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    :root{
      --level-0: #D3D3D3;   / prata suave /
      --level-1: #dcfce7;   / verde suave /
      --level-2: #fef9c3;   / amarelo suave /
      --level-3: #fde68a;   / laranja suave /
      --level-4: #fecdd3;   / rosa suave /
      --level-5: #ddd6fe;   / lilás suave /
      --text-dark: #0f172a;
      --modal-border: #e6e6e6;
      --footer-bg: rgba(255,255,255,0.9);
    }

    html, body {
      min-height: 100vh; margin: 0; padding: 0;
      font-family: 'Poppins', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      overflow-x: hidden; color: var(--text-dark);
    }

    / Calendário ocupa a altura menos o rodapé /
    #calendar {
      position: relative;
      z-index: 10;
      width: 100%;
      height: calc(100vh - 72px);
      background: rgba(255,255,255,0.92);
      box-sizing: border-box;
      padding-bottom: 1rem;
    }

    .background-svg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    / Modal /
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center;
      z-index: 40;
    }
    .modal-content {
      background: #fff; padding: 1.25rem; border-radius: 0.75rem;
      box-shadow: 0 10px 25px rgba(2,6,23,0.12);
      text-align: center; max-width: 420px; width: 92%;
    }
    .modal-content h2 { margin: 0 0 0.75rem 0; font-size: 1.125rem; }
    .modal-row { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.75rem; justify-content:center; }
    .modal-content input[type="number"] {
      width: 140px;
      padding: .5rem; font-size: 1rem;
      border: 1px solid var(--modal-border); border-radius: .5rem;
      text-align: center;
    }
    .level-preview {
      width: 120px; height: 40px; border-radius: .5rem;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; color:var(--text-dark); border:1px solid rgba(0,0,0,0.06);
    }
    .modal-actions { display:flex; justify-content:center; gap:0.5rem; margin-top:0.5rem; }
    .modal-content button {
      padding: .5rem 1rem; border: none; border-radius: .5rem;
      font-weight: 700; cursor: pointer;
    }
    .btn-save { background: #15803d; color: #fff; }
    .btn-cancel { background: #ef4444; color: #fff; }

    / Rodapé com níveis /
    .footer {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem;
      background: var(--footer-bg);
      z-index: 30;
      box-shadow: 0 -6px 18px rgba(2,6,23,0.06);
      box-sizing: border-box;
    }

    .levels { display:flex; gap:0.5rem; align-items:center; flex:1; }

    .level {
      display:flex; align-items:center; gap:0.5rem;
      padding: 0.45rem 0.6rem;
      border-radius: 0.6rem;
      user-select: none;
      min-width: 64px;
      justify-content:center;
      font-weight:700;
      color: var(--text-dark);
      border: 1px solid rgba(15,23,42,0.06);
      text-align:center;
    }

    .level[data-level="0"] { background: var(--level-0); }
    .level[data-level="1"] { background: var(--level-1); }
    .level[data-level="2"] { background: var(--level-2); }
    .level[data-level="3"] { background: var(--level-3); }
    .level[data-level="4"] { background: var(--level-4); }
    .level[data-level="5"] { background: var(--level-5); }

    .legend { font-size: 0.9rem; margin-left: 0.75rem; white-space: nowrap; }

    / Responsividade /
    @media (max-width:600px){
      .level { min-width: 48px; padding: 0.35rem 0.45rem; font-size: 0.9rem; }
      #calendar { height: calc(100vh - 96px); }
      .modal-content { max-width: 320px; }
    }
  </style>
</head>

<body>
  <!-- Fundo animado -->
  <svg class="background-svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="280" cy="280" r="280" fill="#1e3a8a" />
    <circle cx="1160" cy="280" r="280" fill="#ef4444" />
    <circle cx="280" cy="520" r="280" fill="#facc15" />
    <circle cx="1160" cy="520" r="280" fill="#15803d" />
  </svg>

  <!-- Calendário -->
  <div id="calendar" aria-label="Calendário"></div>

  <!-- Modal para inserir valor e ver nível calculado -->
  <div class="modal" id="codeModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h2 id="modalTitle">Adicionar Valor</h2>

      <div class="modal-row">
        <label for="codeInput" style="font-weight:700; margin-right:0.5rem;">Valor</label>
        <input type="number" id="codeInput" placeholder="0 - 600" min="0" max="600" aria-label="Valor numérico" />
      </div>

      <div class="modal-row" style="gap:1rem;">
        <div style="text-align:left;">
          <div style="font-size:0.9rem; color:rgba(15,23,42,0.8); margin-bottom:0.25rem;">Nível calculado</div>
          <div id="levelInfo" style="font-weight:700;">—</div>
        </div>
        <div class="level-preview" id="levelPreview">—</div>
      </div>

      <div class="modal-actions">
        <button class="btn-save" id="saveCode">Salvar</button>
        <button class="btn-cancel" id="cancelCode">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Rodapé com níveis (informativo) -->
  <footer class="footer" aria-label="Níveis">
    <div class="levels" role="list">
      <div class="level" role="listitem" data-level="0">Nível 0<br><small>(0–29)</small></div>
      <div class="level" role="listitem" data-level="1">Nível 1<br><small>(30)</small></div>
      <div class="level" role="listitem" data-level="2">Nível 2<br><small>(31–60)</small></div>
      <div class="level" role="listitem" data-level="3">Nível 3<br><small>(61–149)</small></div>
      <div class="level" role="listitem" data-level="4">Nível 4<br><small>(150–299)</small></div>
      <div class="level" role="listitem" data-level="5">Nível 5<br><small>(300–600)</small></div>
    </div>
    <div class="legend">Insira um valor; o sistema atribuirá o nível automaticamente.</div>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const STORAGE_KEY = 'calendarEvents';
    let savedEvents = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // Recupera cores definidas em CSS
    const LEVELS = {
      0: getComputedStyle(document.documentElement).getPropertyValue('--level-0').trim() || '#e0f2fe',
      1: getComputedStyle(document.documentElement).getPropertyValue('--level-1').trim() || '#dcfce7',
      2: getComputedStyle(document.documentElement).getPropertyValue('--level-2').trim() || '#fef9c3',
      3: getComputedStyle(document.documentElement).getPropertyValue('--level-3').trim() || '#fde68a',
      4: getComputedStyle(document.documentElement).getPropertyValue('--level-4').trim() || '#fecdd3',
      5: getComputedStyle(document.documentElement).getPropertyValue('--level-5').trim() || '#ddd6fe'
    };

    // Função que converte valor em nível conforme solicitado.
    // Observação: para resolver sobreposições ambíguas, adotei a regra:
    // 0–29 => nível 0
    // 30 => nível 1
    // 31–60 => nível 2
    // 61–149 => nível 3
    // 150–299 => nível 4
    // 300–600 => nível 5
    function getLevel(value) {
      if (typeof value !== 'number' || isNaN(value)) return null;
      if (value >= 0 && value <= 29) return 0;
      if (value === 30) return 1;
      if (value >= 31 && value <= 60) return 2;
      if (value >= 61 && value <= 149) return 3;
      if (value >= 150 && value <= 299) return 4;
      if (value >= 300 && value <= 600) return 5;
      return null;
    }

    // Inicializa FullCalendar
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'pt-br',
      selectable: true,
      editable: true,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      events: savedEvents.map(ev => {
        // garante compatibilidade com objetos salvos
        const color = ev.color || (ev.level !== undefined ? LEVELS[ev.level] : LEVELS[0]);
        return {
          title: ev.title,
          start: ev.start,
          allDay: true,
          backgroundColor: color,
          borderColor: color,
          textColor: '#0f172a',
          extendedProps: { level: ev.level }
        };
      }),
      dateClick: function(info) {
        // Duplo clique simulado: mesma data em menos de 400ms
        const now = Date.now();
        if (calendar.lastClickDate === info.dateStr && (now - (calendar.lastClickTime || 0)) < 400) {
          openModalForDate(info.dateStr);
        }
        calendar._lastClickDate = info.dateStr;
        calendar._lastClickTime = now;
      },
      eventClick: function(info) {
        // Ao clicar em evento: editar (abre modal preenchido) ou remover
        const ev = info.event;
        const currentTitle = ev.title || '';
        if (confirm(Editar evento "${currentTitle}"?\nOK = editar; Cancel = remover)) {
          openModalForDate(ev.startStr, ev);
        } else {
          if (confirm('Remover este evento?')) {
            // remove do calendário e do storage
            const start = ev.startStr;
            const title = ev.title;
            ev.remove();
            savedEvents = savedEvents.filter(e => !(e.start === start && e.title === title));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(savedEvents));
          }
        }
      }
    });

    calendar.render();

    // Modal e elementos
    const modal = document.getElementById('codeModal');
    const input = document.getElementById('codeInput');
    const saveBtn = document.getElementById('saveCode');
    const cancelBtn = document.getElementById('cancelCode');
    const levelInfo = document.getElementById('levelInfo');
    const levelPreview = document.getElementById('levelPreview');

    // Atualiza preview do nível conforme valor digitado
    function updatePreviewFromValue(val) {
      const n = Number(val);
      const lvl = getLevel(n);
      if (lvl === null) {
        levelInfo.textContent = 'Valor inválido';
        levelPreview.textContent = '—';
        levelPreview.style.background = 'transparent';
        levelPreview.style.border = '1px dashed rgba(0,0,0,0.06)';
      } else {
        levelInfo.textContent = Nível ${lvl};
        levelPreview.textContent = Nível ${lvl};
        levelPreview.style.background = LEVELS[lvl];
        levelPreview.style.border = '1px solid rgba(0,0,0,0.06)';
      }
    }

    // Abre modal para data; se eventObj for passado, preenche para edição
    function openModalForDate(dateStr, eventObj = null) {
      modal.style.display = 'flex';
      if (eventObj) {
        // preencher com valor extraído do título se possível (assume formato "Valor: X (Nível Y)")
        const match = (eventObj.title || '').match(/Valor:\s([0-9]+)\s/);
        input.value = match ? match[1] : '';
        updatePreviewFromValue(input.value);
        // salvar handler editar
        saveBtn.onclick = function() {
          const raw = input.value.trim();
          const value = raw === '' ? NaN : Number(raw);
          const lvl = getLevel(value);
          if (lvl === null) {
            alert('Valor inválido. Insira um número entre 0 e 600 conforme as faixas.');
            return;
          }
          const color = LEVELS[lvl];
          // atualiza evento no calendário
          eventObj.setProp('title', Valor: ${value} (Nível ${lvl}));
          eventObj.setProp('backgroundColor', color);
          eventObj.setProp('borderColor', color);
          eventObj.setExtendedProp('level', lvl);
          // rebuild savedEvents
          rebuildSavedFromCalendar();
          modal.style.display = 'none';
        };
      } else {
        input.value = '';
        updatePreviewFromValue('');
        saveBtn.onclick = function() {
          const raw = input.value.trim();
          if (raw === '') {
            alert('Digite um valor entre 0 e 600.');
            return;
          }
          const value = Number(raw);
          const lvl = getLevel(value);
          if (lvl === null) {
            alert('Valor inválido. Insira um número entre 0 e 600 conforme as faixas.');
            return;
          }
          const color = LEVELS[lvl];
          const newEvent = {
            title: Valor: ${value} (Nível ${lvl}),
            start: dateStr,
            level: lvl,
            color: color
          };
          calendar.addEvent({
            title: newEvent.title,
            start: newEvent.start,
            allDay: true,
            backgroundColor: newEvent.color,
            borderColor: newEvent.color,
            textColor: '#0f172a',
            extendedProps: { level: newEvent.level }
          });
          savedEvents.push(newEvent);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(savedEvents));
          modal.style.display = 'none';
        };
      }

      // Cancelar
      cancelBtn.onclick = function() {
        modal.style.display = 'none';
      };

      // Atualiza preview ao digitar
      input.oninput = function() {
        updatePreviewFromValue(this.value);
      };

      // Foco
      setTimeout(() => input.focus(), 50);
    }

    // Reconstrói savedEvents a partir dos eventos atuais do calendário
    function rebuildSavedFromCalendar() {
      const events = calendar.getEvents();
      const arr = events.map(ev => {
        return {
          title: ev.title,
          start: ev.startStr,
          level: ev.extendedProps.level !== undefined ? ev.extendedProps.level : getLevelFromTitle(ev.title),
          color: ev.backgroundColor || ev.borderColor || LEVELS[0]
        };
      });
      savedEvents = arr;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedEvents));
    }

    // Tenta extrair nível do título (fallback)
    function getLevelFromTitle(title) {
      if (!title) return 0;
      const m = title.match(/Nível\s*([0-9]+)/i);
      if (m) return Number(m[1]);
      return 0;
    }

    // Fecha modal ao clicar fora do conteúdo
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.style.display = 'none';
    });

    // Fechar modal com Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.style.display === 'flex') modal.style.display = 'none';
    });

    // Abre modal ao detectar duplo clique (já tratado em dateClick)
    // Para compatibilidade: expõe função globalmente se quiser abrir programaticamente
    window.openModalForDate = openModalForDate;

    // Inicial: se quiser limpar storage para testes, descomente:
    // localStorage.removeItem(STORAGE_KEY);
  });
  </script>
</body>
</html>
`
