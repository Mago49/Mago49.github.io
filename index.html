<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário com Códigos e Plataformas</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    :root{
      --level-0: #fecdd3;
      --level-1: #dcfce7;
      --level-2: #fef9c3;
      --level-3: #fde68a;
      --level-4: #D3D3D3;
      --text-dark: #0f172a;
      --modal-bg: #ffffff;
      --modal-accent: #15803d;
      --modal-cancel: #ef4444;
      --footer-bg: rgba(255,255,255,0.95);
      --event-border: rgba(0,0,0,0.08);
    }

    html, body {
      min-height: 100vh; margin: 0; padding: 0;
      font-family: 'Poppins', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color: var(--text-dark);
      overflow-x: hidden;
      background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
    }

    /* Calendar container */
    #calendar {
      position: relative;
      z-index: 10;
      width: 100%;
      min-height: 520px;
      background: rgba(255,255,255,0.9);
      box-sizing: border-box;
      padding: 1rem;
    }

    .background-svg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.9;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center;
      z-index: 40;
      padding: 1rem;
    }
    .modal-content {
      background: var(--modal-bg); padding: 1.25rem; border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
      text-align: center; max-width: 420px; width: 100%;
      border: 1px solid var(--event-border);
    }

    /* Footer legenda */
    footer.legend {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      background: var(--footer-bg);
      border-top: 1px solid rgba(15,23,42,0.06);
      display:flex; gap:1rem; align-items:center;
      padding: 0.75rem 1rem;
      box-shadow: 0 -6px 18px rgba(2,6,23,0.03);
      flex-wrap:wrap;
    }
    .legend-item { display:flex; gap:0.5rem; align-items:center; font-size:0.95rem; color:var(--text-dark); }
    .legend-swatch { width:28px; height:20px; border-radius:6px; border:1px solid var(--event-border); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.03); }
    .legend-label { font-weight:600; margin-right:0.25rem; color:#0f172a; }

    /* Event styling helper */
    .fc-event {
      border-radius: 8px;
      padding: 2px 6px;
      font-weight:700;
      color: #0f172a;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: none;
    }

    .fc-event-title {
      font-size: 0.75rem;
      white-space: normal;
      word-break: break-word;
      padding: 2px;
    }

    /* Platform panel */
    #platformPanel {
      position: relative;
      right: auto;
      top: auto;
      width: calc(100% - 2rem);
      max-width: 1040px;
      margin: 1rem auto 2.5rem;
      height: auto;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(15,23,42,0.06);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.06);
      padding: 0.75rem;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-family: inherit;
      overflow: visible;
    }
    #platformPanel .panel-header { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
    #platformPanel h3 { margin:0; font-size:1rem; }
    #platformPanel .panel-controls { display:flex; gap:0.5rem; align-items:center; }
    #platformPanel input[type="search"] { padding:0.4rem 0.5rem; border-radius:8px; border:1px solid #e6e9ee; flex: 1; }
    #platformPanel button { padding:0.35rem 0.6rem; border-radius:8px; border: none; background:#0f172a; color:#fff; cursor:pointer; font-weight:600; font-size: 0.85rem; }
    #platformPanel button[title] { background:#6b7280; }
    .panel-actions { display:flex; gap:0.5rem; }
    .panel-actions button { background:#15803d; padding:0.35rem 0.5rem; font-size:0.85rem; }
    .panel-actions button[title] { background:#ef4444; }
    #platformList { list-style:none; margin:0; padding:0; overflow:auto; flex:1; display:flex; flex-direction:column; gap:0.25rem; }
    .platform-item {
      display:flex; flex-direction: column; gap:0.35rem;
      padding:0.6rem; border-radius:8px; border:1px solid rgba(0,0,0,0.04);
      background:#fff; cursor: pointer; transition: all 0.2s;
    }
    .platform-item:hover { background: #f8fafc; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .platform-item.selected { box-shadow: 0 6px 18px rgba(21,128,61,0.15); border-color: #15803d; }
    .platform-item-header { display:flex; align-items:center; gap:0.5rem; }
    .platform-item .name { flex:1; font-weight:600; color:var(--text-dark); }
    .platform-item .reset-date { font-size:0.75rem; color:#64748b; }
    .platform-deposit-form {
      display: flex; gap: 0.35rem; align-items: center;
      padding-top: 0.35rem; border-top: 1px solid #e6e9ee;
    }
    .platform-deposit-form input {
      flex: 1; padding: 0.35rem; font-size: 0.85rem;
      border: 1px solid #e6e9ee; border-radius: 6px;
    }
    .platform-deposit-form button {
      padding: 0.35rem 0.5rem; font-size: 0.8rem; background: #15803d;
    }
    .panel-footer { text-align:left; font-size:0.9rem; color:#334155; }

    @media (max-width:900px){
      #platformPanel { width: 92%; margin: 0.75rem auto 2rem; }
      #calendar { min-height: 420px; }
    }
  </style>
</head>

<body>
  <!-- Fundo animado com bolinhas -->
  <svg class="background-svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="280" cy="280" r="280" fill="#1e3a8a" />
    <circle cx="1160" cy="280" r="280" fill="#ef4444" />
    <circle cx="280" cy="520" r="280" fill="#facc15" />
    <circle cx="1160" cy="520" r="280" fill="#15803d" />
  </svg>

  <!-- Calendário -->
  <div id="calendar"></div>

  <!-- Painel de plataformas (abaixo do calendário) -->
  <aside id="platformPanel" aria-label="Painel de plataformas">
    <div class="panel-header">
      <h3>Plataformas</h3>
      <div class="panel-controls">
        <input id="platformSearch" type="search" placeholder="Buscar" aria-label="Buscar plataforma" />
        <button id="togglePanelBtn" aria-expanded="true" title="Ocultar painel">✕</button>
      </div>
    </div>

    <div class="panel-actions">
      <button id="resetAllBtn" title="Resetar todos os depósitos">Resetar</button>
    </div>

    <ul id="platformList" role="list" aria-live="polite"></ul>

    <div class="panel-footer">
      <small id="platformCount"></small>
    </div>
  </aside>

  <!-- Rodapé com níveis -->
  <footer class="legend" aria-hidden="false">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--level-0)"></div><div><span class="legend-label">Nível 0</span><span>1–29</span></div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--level-1)"></div><div><span class="legend-label">Nível 1</span><span>30–69</span></div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--level-2)"></div><div><span class="legend-label">Nível 2</span><span>70–149</span></div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--level-3)"></div><div><span class="legend-label">Nível 3</span><span>150–299</span></div></div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--level-4)"></div><div><span class="legend-label">Nível 4</span><span>300–600</span></div></div>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    /* -------------------------
       Fundo animado
       ------------------------- */
    const svg = document.querySelector('svg.background-svg');
    const circles = Array.from(svg.querySelectorAll('circle'));
    const viewbox = svg.viewBox.baseVal;
    const initialRadii = [280, 280, 280, 280];

    const data = circles.map((c, i) => {
      const initR = initialRadii[i] * (0.28 + Math.random() * 0.12);
      return {
        el: c,
        x: (Math.random() * viewbox.width) | 0,
        y: (Math.random() * viewbox.height) | 0,
        r: initR,
        vx: (Math.random() * 0.6 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
        vy: (Math.random() * 0.6 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
        vr: (Math.random() * 0.04 + 0.01) * (Math.random() < 0.5 ? -1 : 1),
        rmin: initR * 0.4,
        rmax: initR * 1.3
      };
    });

    function animate() {
      data.forEach((d) => {
        d.x += d.vx;
        d.y += d.vy;
        d.r += d.vr;
        if (d.x < -200 || d.x > viewbox.width + 200) d.vx *= -1;
        if (d.y < -200 || d.y > viewbox.height + 200) d.vy *= -1;
        if (d.r < d.rmin || d.r > d.rmax) d.vr *= -1;
        d.el.setAttribute('cx', d.x);
        d.el.setAttribute('cy', d.y);
        d.el.setAttribute('r', Math.max(10, d.r));
      });
      requestAnimationFrame(animate);
    }
    animate();

    /* -------------------------
       Sistema de Plataformas com Depósitos
       ------------------------- */
    const RESET_DAYS = [2, 3, 7, 15, 30];
    const DEFAULT_PLATFORMS = Array.from({length:33}, (_,i) => ({
      id: 'p' + (i+1),
      name: `Plataforma ${i+1}`,
      resetDay: RESET_DAYS[i % RESET_DAYS.length],
      deposits: []
    }));
    const PLAT_STORAGE_KEY = 'depositPlatforms_v2';

    function loadPlatforms(){
      try {
        const raw = localStorage.getItem(PLAT_STORAGE_KEY);
        if (!raw) return DEFAULT_PLATFORMS.slice();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return DEFAULT_PLATFORMS.slice();
        return parsed.map((p, i) => ({
          id: p.id || ('p' + (i+1)),
          name: p.name || (`Plataforma ${i+1}`),
          resetDay: p.resetDay || RESET_DAYS[i % RESET_DAYS.length],
          deposits: Array.isArray(p.deposits) ? p.deposits : []
        }));
      } catch (err) {
        console.error('Erro ao ler plataformas', err);
        return DEFAULT_PLATFORMS.slice();
      }
    }

    function savePlatforms(list){
      localStorage.setItem(PLAT_STORAGE_KEY, JSON.stringify(list));
    }

    /* Helpers para ciclo e emissões */
    function getCycleStart(platform, refDate = new Date()){
      const resetDay = Number(platform.resetDay) || 1;
      let year = refDate.getFullYear();
      let month = refDate.getMonth();
      if (refDate.getDate() < resetDay) {
        month -= 1;
        if (month < 0) { month = 11; year -= 1; }
      }
      return new Date(year, month, resetDay, 0, 0, 0, 0);
    }

    function computeEmissionDates(platform, refDate = new Date()){
      const cycleStart = getCycleStart(platform, refDate);
      const offsets = [2, 3, 7, 15, 30];
      return offsets.map(n => {
        const d = new Date(cycleStart);
        d.setDate(d.getDate() + n);
        d.setHours(0,0,0,0);
        return d;
      });
    }

    function sumDepositsUpTo(platform, toDate){
      const cycleStart = getCycleStart(platform, toDate);
      return (platform.deposits || [])
        .filter(d => {
          const depositDate = new Date(d.date);
          return depositDate >= cycleStart && depositDate <= toDate;
        })
        .reduce((s, d) => s + (Number(d.value) || 0), 0);
    }

    function getTotalDepositsSinceCycle(platform){
      return sumDepositsUpTo(platform, new Date());
    }

    function formatResetDate(resetDay){
      return `${resetDay} de cada mês`;
    }

    function colorForLevel(valueOrLevel){
      const root = getComputedStyle(document.documentElement);
      const lvlVars = [
        root.getPropertyValue('--level-0').trim(),
        root.getPropertyValue('--level-1').trim(),
        root.getPropertyValue('--level-2').trim(),
        root.getPropertyValue('--level-3').trim(),
        root.getPropertyValue('--level-4').trim()
      ];

      const v = Number(valueOrLevel);
      if (Number.isInteger(v) && v >= 0 && v <= 4) {
        return lvlVars[v];
      }

      const amount = isNaN(v) ? 0 : v;
      if (amount >= 300) return lvlVars[4];
      if (amount >= 150) return lvlVars[3];
      if (amount >= 70)  return lvlVars[2];
      if (amount >= 30)  return lvlVars[1];
      return lvlVars[0];
    }

    function renderPlatformList(filter = ''){
      const listEl = document.getElementById('platformList');
      const countEl = document.getElementById('platformCount');
      listEl.innerHTML = '';
      const q = filter.trim().toLowerCase();
      const items = platforms.filter(p => p.name.toLowerCase().includes(q));

      items.forEach(p => {
        const li = document.createElement('li');
        li.className = 'platform-item';
        li.dataset.id = p.id;

        const total = getTotalDepositsSinceCycle(p);
        const bgColor = colorForLevel(total);

        const header = document.createElement('div');
        header.className = 'platform-item-header';

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = p.name;

        const swatch = document.createElement('div');
        swatch.style.width = '12px';
        swatch.style.height = '12px';
        swatch.style.borderRadius = '4px';
        swatch.style.background = bgColor;
        swatch.title = `Cor pelo total: R$ ${total.toFixed(2)}`;

        header.appendChild(swatch);
        header.appendChild(name);
        li.appendChild(header);

        const resetInfo = document.createElement('div');
        resetInfo.className = 'reset-date';
        resetInfo.textContent = `${formatResetDate(p.resetDay)} | Total no ciclo: R$ ${total.toFixed(2)}`;
        li.appendChild(resetInfo);

        const form = document.createElement('div');
        form.className = 'platform-deposit-form';

        const input = document.createElement('input');
        input.type = 'number';
        input.placeholder = 'Valor do depósito';
        input.min = '0';
        input.step = '0.01';
        input.value = '';

        const btn = document.createElement('button');
        btn.textContent = 'Adicionar';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const value = parseFloat(input.value);
          if (isNaN(value) || value <= 0) {
            alert('Digite um valor válido');
            return;
          }
          p.deposits.push({
            date: new Date().toISOString(),
            value: value
          });
          input.value = '';
          savePlatforms(platforms);
          updateCalendarEvents();
          renderPlatformList(q);
        });

        const resetBtn = document.createElement('button');
        resetBtn.textContent = 'Reinício';
        resetBtn.title = 'Zerar depósitos do ciclo desta plataforma';
        resetBtn.style.background = '#ef4444';
        resetBtn.style.marginLeft = '6px';
        resetBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (!confirm(`Zerar depósitos do ciclo atual de ${p.name}?`)) return;
          p.deposits = [];
          savePlatforms(platforms);
          updateCalendarEvents();
          renderPlatformList(q);
        });

        form.appendChild(input);
        form.appendChild(btn);
        form.appendChild(resetBtn);
        li.appendChild(form);

        li.addEventListener('click', (e) => {
          if (e.target === btn || e.target === input || e.target === resetBtn) return;
          document.querySelectorAll('.platform-item').forEach(el => el.classList.remove('selected'));
          li.classList.add('selected');
          filterCalendarByPlatform(p.id);
        });

        listEl.appendChild(li);
      });

      const totalAll = platforms.reduce((s, pl) => s + getTotalDepositsSinceCycle(pl), 0);
      countEl.textContent = `${items.length} plataformas • Total geral no ciclo: R$ ${totalAll.toFixed(2)}`;
    }

    let platforms = loadPlatforms();
    renderPlatformList();

    document.getElementById('platformSearch').addEventListener('input', (e) => {
      renderPlatformList(e.target.value);
    });

    document.getElementById('resetAllBtn').addEventListener('click', () => {
      if (!confirm('Resetar todos os depósitos de TODAS as plataformas?')) return;
      platforms.forEach(p => p.deposits = []);
      savePlatforms(platforms);
      renderPlatformList();
      updateCalendarEvents();
    });

    const toggleBtn = document.getElementById('togglePanelBtn');
    const panel = document.getElementById('platformPanel');
    toggleBtn.addEventListener('click', () => {
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'flex' : 'none';
      toggleBtn.title = isHidden ? 'Ocultar painel' : 'Mostrar painel';
    });

    /* -------------------------
       Calendário integrado
       ------------------------- */
    const calendarEl = document.getElementById('calendar');

    function updateCalendarEvents(){
      if (!calendar) return;
      calendar.removeAllEvents();

      const now = new Date();
      const windowFrom = new Date(now); windowFrom.setDate(windowFrom.getDate() - 10);
      const windowTo = new Date(now); windowTo.setDate(windowTo.getDate() + 40);

      platforms.forEach(platform => {
        const emissionDates = computeEmissionDates(platform, now);
        emissionDates.forEach(emDate => {
          if (emDate >= windowFrom && emDate <= windowTo) {
            const totalAtEmission = sumDepositsUpTo(platform, emDate);
            const bg = colorForLevel(totalAtEmission);

            calendar.addEvent({
              id: `emit_${platform.id}_${emDate.toISOString().slice(0,10)}`,
              title: platform.name,
              start: emDate.toISOString().slice(0,10),
              allDay: true,
              display: 'block',
              backgroundColor: bg,
              borderColor: 'rgba(0,0,0,0.06)',
              extendedProps: {
                platformId: platform.id,
                platformName: platform.name,
                totalAtEmission: totalAtEmission
              }
            });
          }
        });
      });
    }

    function filterCalendarByPlatform(platformId){
      const allEvents = calendar.getEvents();
      allEvents.forEach(event => {
        const eventPlatformId = event.extendedProps.platformId;
        event.setProp('display', eventPlatformId === platformId ? 'block' : 'none');
      });
      const p = platforms.find(x => x.id === platformId);
      if (p) {
        console.log(`Filtrando: ${p.name} | Total no ciclo: R$ ${getTotalDepositsSinceCycle(p).toFixed(2)}`);
      }
    }

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'pt-br',
      selectable: true,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      events: [],
      eventDisplay: 'block',
      eventDidMount: function(info){
        const bg = info.event.backgroundColor;
        info.el.style.background = bg;
        info.el.style.color = '#0f172a';
        info.el.style.border = '1px solid rgba(0,0,0,0.06)';
        info.el.style.borderRadius = '8px';
        info.el.style.fontWeight = '700';
        info.el.style.fontSize = '0.75rem';
        info.el.style.padding = '2px';
      }
    });

    calendar.render();
    updateCalendarEvents();

    function scheduleDailyUpdate(){
      const now = new Date();
      const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
      const ms = nextMidnight - now;
      setTimeout(() => {
        updateCalendarEvents();
        scheduleDailyUpdate();
      }, ms);
    }
    scheduleDailyUpdate();
  });
  </script>
</body>
</html>
